<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nestd - Storage Organizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f1117; color: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #3b82f6, #6366f1); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 36px; }
    h1 { font-size: 36px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: #94a3b8; max-width: 480px; line-height: 1.6; margin-bottom: 32px; }
    .download-btn { display: inline-block; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; margin-bottom: 32px; transition: opacity 0.2s; }
    .download-btn:hover { opacity: 0.9; text-decoration: none; color: #fff; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a { color: #3b82f6; text-decoration: none; font-size: 14px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">📦</div>
  <h1>Nestd</h1>
  <p>The simplest way to organize your storage boxes and track everything you own — across all your devices.</p>
  <a class="download-btn" href="https://apps.apple.com/app/nestd/id6772371690">Download on the App Store</a>
  <div class="links">
    <a href="mailto:support@nestd.net">Contact Support</a>
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
  </div>
</body>
</html>
